<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suivi des réservations SOAP — Camping du Lac de Carouge</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div>
      <h1>Suivi des réservations SOAP</h1>
      <p class="sub">Camping du Lac de Carouge — extraction &amp; consolidation des fichiers FTP</p>
    </div>
    <div class="actions">
      <button id="scanBtn" class="btn primary">⟳ Scanner maintenant</button>
      <a id="exportBtn" class="btn" href="/api/export.csv">⤓ Export CSV</a>
      <button id="pwBtn" class="btn" title="Changer le mot de passe">🔑</button>
      <button id="logoutBtn" class="btn" title="Se déconnecter">⤴ Déconnexion</button>
    </div>
  </header>

  <section id="banner" class="banner hidden"></section>

  <section class="stats" id="stats"></section>

  <section class="toolbar">
    <div class="filters" id="filters">
      <button class="chip active" data-status="all">Tout</button>
      <button class="chip" data-status="success">Réussies</button>
      <button class="chip" data-status="error_pms">Erreur PMS</button>
      <button class="chip" data-status="error_other">Autres erreurs</button>
      <button class="chip" data-status="pending">En attente</button>
    </div>
    <input type="search" id="search" placeholder="Rechercher (BScrc, n° résa, établissement…)">
  </section>

  <section class="table-wrap">
    <table id="table">
      <thead>
        <tr>
          <th>Statut</th>
          <th>Date</th>
          <th>Client</th>
          <th>N° résa</th>
          <th>Montant</th>
          <th>Moyen</th>
          <th>Encaissement</th>
          <th>Tent.</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <p id="empty" class="empty hidden">Aucune réservation pour ce filtre.</p>
  </section>

  <!-- Détail (modale) -->
  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <button class="modal-close" id="modalClose">✕</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <!-- Changement de mot de passe (modale) -->
  <div id="pwModal" class="modal hidden">
    <div class="modal-box" style="max-width:420px">
      <button class="modal-close" id="pwClose">✕</button>
      <h2>Changer le mot de passe</h2>
      <form id="pwForm" class="login-form">
        <input type="password" id="pwCurrent" placeholder="Mot de passe actuel" autocomplete="current-password" required>
        <input type="password" id="pwNext" placeholder="Nouveau mot de passe (min. 6)" autocomplete="new-password" required>
        <p id="pwMsg" class="login-msg"></p>
        <button type="submit" class="btn primary">Valider</button>
      </form>
    </div>
  </div>

  <!-- Écran de connexion -->
  <div id="loginOverlay" class="login-overlay hidden">
    <form id="loginForm" class="login-box">
      <h2>Connexion</h2>
      <p class="sub">Suivi des réservations — Camping du Lac de Carouge</p>
      <input type="text" id="loginUser" placeholder="Identifiant" autocomplete="username" value="admin">
      <input type="password" id="loginPass" placeholder="Mot de passe" autocomplete="current-password" required>
      <p id="loginMsg" class="login-msg"></p>
      <button type="submit" class="btn primary">Se connecter</button>
    </form>
  </div>

  <script src="app.js"></script>
</body>
</html>
